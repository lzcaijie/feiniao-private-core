{extend name="common/base"/}
<!-- 主体 -->
{block name="body"}
<form class="layui-form p-4">
	<h3 class="pb-3">作品标签配置</h3>
	<table class="layui-table layui-table-form">
		<tr>
			<td class="layui-td-gray">作品风格</td>
			<td ><textarea name="style" placeholder="请填写作品风格，以半角逗号分割。" class="layui-textarea">{$config.style|default=''}</textarea></td>
		</tr>
		<tr>
			<td class="layui-td-gray">作品结局</td>
			<td ><textarea name="ending" placeholder="请填写作品结局，以半角逗号分割。" class="layui-textarea">{$config.ending|default=''}</textarea></td>
		</tr>
		<tr>
			<td class="layui-td-gray">主角身份</td>
			<td ><textarea name="identity" placeholder="请填写主角身份，以半角逗号分割。" class="layui-textarea">{$config.identity|default=''}</textarea></td>
		</tr>
		<tr>
			<td class="layui-td-gray">主角形象</td>
			<td ><textarea name="image" placeholder="请填写主角形象，以半角逗号分割。" class="layui-textarea">{$config.image|default=''}</textarea></td>
		</tr>
		<tr>
			<td class="layui-td-gray">作品流派</td>
			<td ><textarea name="schools" placeholder="请填写作品流派，以半角逗号分割。" class="layui-textarea">{$config.schools|default=''}</textarea></td>
		</tr>
		<tr>
			<td class="layui-td-gray">故事元素</td>
			<td ><textarea name="element" placeholder="请填写故事元素，以半角逗号分割。" class="layui-textarea">{$config.element|default=''}</textarea></td>
		</tr>
	</table>

	<div class="py-3">
		<input type="hidden" value="{$id}" name="id">
		<button class="layui-btn layui-btn-normal" lay-submit="" lay-filter="webform">立即提交</button>
		<button type="reset" class="layui-btn layui-btn-primary">重置</button>
	</div>
</form>
{/block}
<!-- /主体 -->

<!-- 脚本 -->
{block name="script"}
<script>
	const moduleInit = ['tool'];
	function feiniaoInit() {
		var form = layui.form, tool = layui.tool;
		//监听提交
		form.on('submit(webform)', function (data) {
			let callback = function (e) {
				layer.msg(e.msg);
				if (e.code == 0) {
					parent.layui.tool.close(1000);
				}
			}
			tool.post("{:url('conf/edit')}", data.field, callback);
			return false;
		});
	}
</script>
{/block}
<!-- /脚本 -->
