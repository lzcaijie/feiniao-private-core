{extend name="common/base"/}
<!-- 主体 -->
{block name="body"}
    <style>
         :root {
            --primary-color: #f1f4ff;
            --secondary-color: #6f42c1;
            --success-color: #1cc88a;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
            --light-color: #f8f9fc;
            --dark-color: #5a5c69;
        }
        
        body {
            background-color: #f8f9fc;
            color: #444;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
        }             
        
        .main-container {
            display: flex;
            min-height: calc(100vh - 120px);
        }
        
        .content {
            flex: 1;
            padding: 25px;
            background-color: #f8f9fc;
            overflow-y: auto;
        }
        
        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
        }
        
        .card-body {
            padding: 20px;
        }        
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-active {
            background-color: rgba(28, 200, 138, 0.15);
            color: var(--success-color);
        }
        
        .status-inactive {
            background-color: rgba(231, 74, 59, 0.15);
            color: var(--danger-color);
        }
        
        .action-buttons .layui-btn {
            padding: 0 8px;
            height: 28px;
            line-height: 28px;
            font-size: 12px;
        }
        
        .form-container {
            padding: 20px 20px 0 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
        }
        
        .form-row {
            display: flex;
            flex-wrap: wrap;
            margin: 0 -10px;
        }
        
        .form-col {
            flex: 1;
            min-width: 300px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        
        .upload-container {
            border: 1px dashed #d9d9d9;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
            background: #fafafa;
            height: 92px;
            box-sizing: border-box;
            cursor: pointer;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }
        
        .upload-container:hover {
            border-color: #409eff;
        }
        
        .upload-preview {
            max-width: auto;
            max-height: 60px;
        }
        
        .site-logo {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
        }

        #qrcodeUpload {
            position: relative;
        }
        
        #qrcodeUpload .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #qrcodeUpload:hover .delete-btn {
            opacity: 1;
        }
        #qrcodeUpload .delete-btn:hover {
            background: rgba(231, 76, 60, 0.8);
        }

        #coverUpload {
            position: relative;
        }
        
        #coverUpload .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #coverUpload:hover .delete-btn {
            opacity: 1;
        }
        #coverUpload .delete-btn:hover {
            background: rgba(231, 76, 60, 0.8);
        }

        #avatarUpload {
            position: relative;
        }
        
        #avatarUpload .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #avatarUpload:hover .delete-btn {
            opacity: 1;
        }
        #avatarUpload .delete-btn:hover {
            background: rgba(231, 76, 60, 0.8);
        }

        .info-row {
            display: flex;
            margin-bottom: 15px;
        }
        
        .info-label {
            width: 100px;
            font-weight: 600;
            color: var(--dark-color);
        }
        
        .info-value {
            flex: 1;
        }
        
        .detail-section {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .detail-section h3 {
            margin-bottom: 15px;
            color: var(--secondary-color);
        }
        
        .statistics-code {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow: auto;
        }
        
        @media (max-width: 768px) {
            .form-col {
                min-width: 100%;
            }
            
            .action-bar {
                flex-direction: column;
                gap: 10px;
            }
            
            .search-box {
                width: 100%;
            }
            
            #siteSearch {
                width: 100% !important;
            }
        }
    </style>
    <div class="main-container">
        <!-- 主内容区 -->
        <div class="content">     
            <!-- 站点管理 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title"><i class="layui-icon layui-icon-website"></i> 站点管理</h2>
                    <button class="layui-btn layui-btn-normal" id="addSiteBtn">
                        <i class="layui-icon layui-icon-addition"></i> 添加站点
                    </button>
                </div>
                <div class="card-body">
                    <div class="action-bar">
                        <div class="search-box">
                            <input type="text" class="layui-input" id="siteSearch" placeholder="搜索站点名称或域名" style="width: 300px;">
                            <button class="layui-btn" id="siteSearchBtn">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                        </div>
                        <div>
                            <button class="layui-btn layui-btn-primary" id="refreshSiteBtn">
                                <i class="layui-icon layui-icon-refresh"></i> 刷新
                            </button>
                        </div>
                    </div>                    
                    <table id="siteTable" lay-filter="siteTable"></table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加站点弹窗 -->
    <div id="siteForm" style="display: none;">
        <form class="layui-form form-container" id="siteFormData">
            <input type="hidden" name="site_id" value="0">
            <div class="form-row">
                <div class="form-col">
                    <div class="form-group">
                        <label>站点名称</label>
                        <input type="text" name="site_name" class="layui-input" placeholder="请输入站点名称">
                    </div>                    
                    <div class="form-group">
                        <label>绑定域名</label>
                        <input type="text" class="layui-input" name="domain" lay-verify="required" lay-reqText="请填写绑定域名" placeholder="例如：www.novel.com或*.novel.com">
                    </div>                    
                    <div class="form-group">
                        <label>PC模板</label>
                        <select class="layui-select" name="template_pc" lay-verify="required" lay-reqText="请选择PC模板">
                            <option value="">请选择PC模板</option>
                            {volist name=":list_dir('template')" id="v"}
                            <option value="{$v}">{$v}</option>
                            {/volist}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>移动模板</label>
                        <select class="layui-select" name="template_mobile" lay-verify="required" lay-reqText="请选择移动模板">
                            <option value="">请选择移动模板</option>
                            {volist name=":list_dir('template')" id="v"}
                            <option value="{$v}">{$v}</option>
                            {/volist}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>备案号</label>
                        <input type="text" name="icp" class="layui-input" placeholder="例如：京ICP备12345678号">
                    </div>                    
                    <div class="form-group">
                        <label>公安备案号</label>
                        <input type="text" name="police_icp" class="layui-input" placeholder="例如：京公网安备12345678号">
                    </div>                    
                    <div class="form-group">
                        <label>版权信息</label>
                        <input type="text" name="copyright" class="layui-input" placeholder="例如：©2023 公司名称">
                    </div>                    
                </div>
                <div class="form-col">
                    <div class="form-group">
                        <div class="layui-col-xs6">
                            <label>网站LOGO</label>
                            <div class="upload-container" id="logoUpload">
                                <i class="layui-icon layui-icon-upload" style="font-size: 30px;"></i>
                                <div>点击上传LOGO</div>
                                <img class="upload-preview" id="logoPreview" style="display: none;">
                                <input type="hidden" name="logo" id="logoInput">
                            </div>
                        </div>
                        <div class="layui-col-xs6">
                            <label>favicon.ico</label>
                            <div class="upload-container" id="faviconUpload">
                                <i class="layui-icon layui-icon-upload" style="font-size: 30px;"></i>
                                <div>点击上传favicon.ico</div>
                                <img class="upload-preview" id="faviconPreview" style="display: none;">
                                <input type="hidden" name="favicon" id="faviconInput">
                            </div>
                        </div>
                    </div>
                    <hr>
                    <div class="form-group">
                        <div class="layui-col-xs6">
                            <label>App二维码</label>
                            <div class="upload-container" id="qrcodeUpload">
                                <i class="layui-icon layui-icon-upload" style="font-size: 30px;"></i>
                                <div class="qrcodetips">点击上传App二维码</div>
                                <img class="upload-preview" id="qrcodePreview" style="display: none;">
                                <input type="hidden" name="app_qrcode" id="qrcodeInput">
                                <div class="delete-btn" id="deleteQrBtn">
                                    <i class="layui-icon layui-icon-delete"></i>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-xs6">
                            <label>默认封面</label>
                            <div class="upload-container" id="coverUpload">
                                <i class="layui-icon layui-icon-upload" style="font-size: 30px;"></i>
                                <div class="covertips">点击上传默认封面</div>
                                <img class="upload-preview" id="coverPreview" style="display: none;">
                                <input type="hidden" name="cover" id="coverInput">
                                <div class="delete-btn" id="deleteCoverBtn">
                                    <i class="layui-icon layui-icon-delete"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <hr>                    
                    <div class="form-group">
                        <div class="layui-col-xs6">
                            <label>默认头像</label>
                            <div class="upload-container" id="avatarUpload">
                                <i class="layui-icon layui-icon-upload" style="font-size: 30px;"></i>
                                <div class="avatartips">点击上传默认头像</div>
                                <img class="upload-preview" id="avatarPreview" style="display: none;">
                                <input type="hidden" name="avatar" id="avatarInput">
                                <div class="delete-btn" id="deleteAvatarBtn">
                                    <i class="layui-icon layui-icon-delete"></i>
                                </div>
                            </div>
                        </div>
                        <div class="layui-col-xs6">
                            <label>站点状态</label>
                            <div class="upload-container">
                                <input type="checkbox" name="statusSwitch" title="开启|关闭" lay-skin="switch" lay-filter="statusSwitch" checked>
                                <input type="hidden" name="status" id="statusValue" value="1">
                            </div>
                        </div>
                    </div>
                    <hr>
                    <div class="form-group">
                        <label>统计代码</label>
                        <textarea name="statistics" class="layui-textarea" placeholder="请输入统计代码" style="min-height: 100px;"></textarea>
                    </div>                    
                </div>
            </div>
            <div class="layui-form-item">
                <button class="layui-btn layui-btn-fluid" lay-submit>保存站点信息</button>
            </div>
        </form>
    </div>
{/block}
{block name="script"}
    <!-- 站点操作按钮模板 -->
    <script type="text/html" id="siteActionBar">
        <div class="action-buttons">            
            <button class="layui-btn layui-btn-xs layui-bg-orange" lay-event="nav">
                <i class="layui-icon layui-icon-release"></i> 导航
            </button>
            <button class="layui-btn layui-btn-xs layui-btn-normal" lay-event="config">
                <i class="layui-icon layui-icon-set"></i> 配置
            </button>
            <button class="layui-btn layui-btn-xs layui-bg-purple" lay-event="route">
                <i class="layui-icon layui-icon-console"></i> 路由
            </button>
            <button class="layui-btn layui-btn-xs" lay-event="links">
                <i class="layui-icon layui-icon-link"></i> 友链
            </button>
            <button class="layui-btn layui-btn-primary layui-border" lay-event="more">更多<i class="layui-icon layui-icon-down"></i></button>
        </div>
    </script>
    <script>
	const moduleInit = ['tool'];
    var currentPage = 1;
	function feiniaoInit() {
		var table = layui.table, tool = layui.tool, form = layui.form, upload = layui.upload, dropdown = layui.dropdown;
        
        // 初始化上传组件
        function initUpload() {
            // 网站LOGO上传
            upload.render({
                elem: '#logoUpload',
                url: "{:url('api/upload')}",
                accept: 'images',
                acceptMime: 'image/*',                
                done: function(res) {
                    if (res.code === 0) {
                        $('#logoPreview').attr('src', res.data.filepath).show();
                        $('#logoInput').val(res.data.filepath);
                        $('#logoUpload > i').hide();
                        $('#logoUpload > div').hide();
                    } else {
                        layer.msg(res.msg);
                    }
                }
            });            
            // 网站favicon上传
            upload.render({
                elem: '#faviconUpload',
                url: "{:url('api/upload')}",
                accept: 'images',
                acceptMime: 'image/*',
                exts: 'png|ico',
                done: function(res) {
                    if (res.code === 0) {
                        $('#faviconPreview').attr('src', res.data.filepath).show();
                        $('#faviconInput').val(res.data.filepath);
                        $('#faviconUpload > i').hide();
                        $('#faviconUpload > div').hide();
                    } else {
                        layer.msg(res.msg);
                    }
                }
            });            
            // App二维码上传
            upload.render({
                elem: '#qrcodeUpload',
                url: "{:url('api/upload')}",
                accept: 'images',
                acceptMime: 'image/*',
                done: function(res) {
                    if (res.code === 0) {
                        $('#qrcodePreview').attr('src', res.data.filepath).show();
                        $('#qrcodeInput').val(res.data.filepath);
                        $('#qrcodeUpload .layui-icon-upload').hide();
                        $('#qrcodeUpload .qrcodetips').hide();
                        $('#deleteQrBtn').show();
                    } else {
                        layer.msg(res.msg);
                    }
                }
            });      
            // 封面上传
            upload.render({
                elem: '#coverUpload',
                url: "{:url('api/upload')}",
                accept: 'images',
                acceptMime: 'image/*',
                done: function(res) {
                    if (res.code === 0) {
                        $('#coverPreview').attr('src', res.data.filepath).show();
                        $('#coverInput').val(res.data.filepath);
                        $('#coverUpload .layui-icon-upload').hide();
                        $('#coverUpload .covertips').hide();
                        $('#deleteCoverBtn').show();
                    } else {
                        layer.msg(res.msg);
                    }
                }
            });      
            // 头像上传
            upload.render({
                elem: '#avatarUpload',
                url: "{:url('api/upload')}",
                accept: 'images',
                acceptMime: 'image/*',
                done: function(res) {
                    if (res.code === 0) {
                        $('#avatarPreview').attr('src', res.data.filepath).show();
                        $('#avatarInput').val(res.data.filepath);
                        $('#avatarUpload .layui-icon-upload').hide();
                        $('#avatarUpload .avatartips').hide();
                        $('#deleteAvatarBtn').show();
                    } else {
                        layer.msg(res.msg);
                    }
                }
            });      
        }

        // 站点管理表格
        var siteTableIns = table.render({
            elem: '#siteTable',
            url: '{:addons_url("sitegroup://site/index")}',
            id: 'siteTable',
            page: true,
			limit: 20,
            cols: [[
                {field: 'site_id', title: 'ID', width: 80, sort: true},
                {field: 'site_name', title: '站点名称', minWidth: 150},
                {field: 'domain', title: '绑定域名', minWidth: 180},
                {field: 'template_pc', title: 'PC模板', width: 120},
                {field: 'template_mobile', title: '移动模板', width: 120},
                {field: 'status', title: '状态', width: 100, templet: function(d){
                    return d.status == 1 
                        ? '<span class="status-badge status-active">启用</span>' 
                        : '<span class="status-badge status-inactive">禁用</span>';
                }},
                {field: 'create_time', title: '创建时间', width: 180, sort: true, templet:function(d) {
						return d.create_time ? layui.util.toDateString((parseInt(d.create_time) * 1000), 'yyyy-MM-dd HH:mm:ss') : '--';
					}},
                {title: '操作', width: 400, align: 'center', toolbar: '#siteActionBar'}
            ]],
            done: function(res, curr, count) {
                currentPage = curr;
            }
        });
  
        // 添加站点按钮
        $('#addSiteBtn').click(function() {
            $('#siteFormData')[0].reset();
            $('#siteFormData input[name="site_id"]').val('0');            
            $('#logoPreview').hide().attr('src', '');
            $('#logoUpload > i').show();
            $('#logoUpload > div').show();
            $('#faviconPreview').hide().attr('src', '');
            $('#faviconUpload > i').show();
            $('#faviconUpload > div').show();
            $('#qrcodePreview').hide().attr('src', '');
            $('#qrcodeUpload .layui-icon-upload').show();
            $('#qrcodeUpload .qrcodetips').show();
            $('#deleteQrBtn').hide();
            $('#coverPreview').hide().attr('src', '');
            $('#coverUpload .layui-icon-upload').show();
            $('#coverUpload .covertips').show();
            $('#deleteCoverBtn').hide();
            $('#avatarPreview').hide().attr('src', '');
            $('#avatarUpload .layui-icon-upload').show();
            $('#avatarUpload .avatartips').show();
            $('#deleteAvatarBtn').hide();
            layer.open({
                type: 1,
                title: '添加新站点',
                area: ['1000px', '750px'],
                content: $('#siteForm'),
                success: function() {
                    initUpload();
                    form.render();
                }
            });
        });

        // 删除app二维码
        $('#deleteQrBtn').click(function(e) {
            e.stopPropagation();
            $(this).siblings('img').attr('src', '');
			$(this).siblings('input[type="hidden"]').val('');
            $('#qrcodeUpload .layui-icon-upload').show();
            $('#qrcodeUpload .qrcodetips').show();
            $(this).hide();
        });

        // 删除封面
        $('#deleteCoverBtn').click(function(e) {
            e.stopPropagation();
            $(this).siblings('img').attr('src', '');
			$(this).siblings('input[type="hidden"]').val('');
            $('#coverUpload .layui-icon-upload').show();
            $('#coverUpload .covertips').show();
            $(this).hide();
        });

        // 删除头像
        $('#deleteAvatarBtn').click(function(e) {
            e.stopPropagation();
            $(this).siblings('img').attr('src', '');
			$(this).siblings('input[type="hidden"]').val('');
            $('#avatarUpload .layui-icon-upload').show();
            $('#avatarUpload .avatartips').show();
            $(this).hide();
        });

        // 站点搜索
        $('#siteSearchBtn').click(function() {
            var keyword = $('#siteSearch').val().toLowerCase();
            if (!keyword) return layer.msg('请输入关键词！');
            siteTableIns.reload({
				where: {
					keyword: keyword
				},
				page: {
					curr: 1
				}
			});
			return false;
        });

        $('#refreshSiteBtn').click(function() {
            siteTableIns.reload({
				where: {},
				page: {
					curr: 1
				}
			});
			return false;
        });

        form.on('switch(statusSwitch)', function(data){
            var value = this.checked ? '1' : '0';
            $('#statusValue').val(value);
        });
        
        // 站点表格操作按钮
        table.on('tool(siteTable)', function(obj){
            var data = obj.data;
            var event = obj.event;            
            if(event === 'links'){
                tool.side("{:addons_url('sitegroup://links/index')}?site_id=" + data.site_id);
            } else if(event === 'config'){
                tool.side("{:addons_url('sitegroup://config/index')}?site_id=" + data.site_id);
            } else if(event === 'nav'){
                tool.side("{:addons_url('sitegroup://nav/index')}?site_id=" + data.site_id);
            } else if(event === 'route'){
                tool.side("{:addons_url('sitegroup://route/index')}?site_id=" + data.site_id);
            } else if(event === 'more') {
                dropdown.render({
                    elem: this,
                    show: true,
                    data: [{
                        title: '编辑',
                        id: 'edit'
                    },{
                        title: '删除',
                        id: 'delete'
                    }],
                    click: function(menudata) {
                        if(menudata.id === 'edit') {
                            $('#siteFormData input[name="site_id"]').val(data.site_id);
                            $('#siteFormData input[name="site_name"]').val(data.site_name);
                            $('#siteFormData input[name="domain"]').val(data.domain);
                            $('#siteFormData select[name="template_pc"]').val(data.template_pc);
                            $('#siteFormData select[name="template_mobile"]').val(data.template_mobile);
                            $('#siteFormData input[name="status"]').val(data.status);
                            $('#siteFormData input[name="icp"]').val(data.icp || '');
                            $('#siteFormData input[name="police_icp"]').val(data.police_icp || '');
                            $('#siteFormData input[name="copyright"]').val(data.copyright || '');
                            $('#siteFormData textarea[name="statistics"]').val(data.statistics || '');                        
                            $('#siteFormData input[name="statusSwitch"]').prop('checked', data.status == 1 ? true : false);
                     
                            if (data.logo) {
                                $('#logoPreview').attr('src', data.logo).show();
                                $('#logoInput').val(data.logo);
                                $('#logoUpload > i').hide();
                                $('#logoUpload > div').hide();
                            } else {
                                $('#logoPreview').hide().attr('src', '');
                                $('#logoInput').val('');
                                $('#logoUpload > i').show();
                                $('#logoUpload > div').show();
                            }
                            
                            if (data.favicon) {
                                $('#faviconPreview').attr('src', data.favicon).show();
                                $('#faviconInput').val(data.favicon);
                                $('#faviconUpload > i').hide();
                                $('#faviconUpload > div').hide();
                            } else {
                                $('#faviconPreview').hide().attr('src', '');
                                $('#faviconInput').val('');
                                $('#faviconUpload > i').show();
                                $('#faviconUpload > div').show();
                            }
                            
                            if (data.app_qrcode) {
                                $('#qrcodePreview').attr('src', data.app_qrcode).show();
                                $('#qrcodeInput').val(data.app_qrcode);
                                $('#qrcodeUpload .layui-icon-upload').hide();
                                $('#qrcodeUpload .qrcodetips').hide();
                                $('#deleteQrBtn').show();
                            } else {
                                $('#qrcodePreview').hide().attr('src', '');
                                $('#qrcodeInput').val('');
                                $('#qrcodeUpload .layui-icon-upload').show();
                                $('#qrcodeUpload .qrcodetips').show();
                                $('#deleteQrBtn').hide();
                            }
                            
                            if (data.cover) {
                                $('#coverPreview').attr('src', data.cover).show();
                                $('#coverInput').val(data.cover);
                                $('#coverUpload .layui-icon-upload').hide();
                                $('#coverUpload .covertips').hide();
                                $('#deleteCoverBtn').show();
                            } else {
                                $('#coverPreview').hide().attr('src', '');
                                $('#coverInput').val('');
                                $('#coverUpload .layui-icon-upload').show();
                                $('#coverUpload .covertips').show();
                                $('#deleteCoverBtn').hide();
                            }
                            
                            if (data.avatar) {
                                $('#avatarPreview').attr('src', data.avatar).show();
                                $('#avatarInput').val(data.avatar);
                                $('#avatarUpload .layui-icon-upload').hide();
                                $('#avatarUpload .avatartips').hide();
                                $('#deleteAvatarBtn').show();
                            } else {
                                $('#avatarPreview').hide().attr('src', '');
                                $('#avatarInput').val('');
                                $('#avatarUpload .layui-icon-upload').show();
                                $('#avatarUpload .avatartips').show();
                                $('#deleteAvatarBtn').hide();
                            }

                            layer.open({
                                type: 1,
                                title: '编辑站点信息',
                                area: ['1000px', '750px'],
                                content: $('#siteForm'),
                                success: function() {
                                    initUpload();
                                    form.render();
                                }
                            });
                        } else if(menudata.id === 'delete') {
                            layer.confirm('确定要删除站点：' + data.site_name + ' 吗？', {
                                icon: 3,
                                title: '删除确认',
                                btn: ['确定', '取消']
                            }, function(index) {
                                var loadIndex = layer.load(2);
                                let callback = function (e) {    
                                    layer.close(loadIndex);                    
                                    layer.msg(e.msg);
                                    if (e.code == 0) {                            
                                        layer.msg('站点已删除', {icon: 1});
                                        layer.close(index);
                                        siteTableIns.reload();
                                    }
                                }
                                tool.delete("{:addons_url('sitegroup://site/delete')}", { id: data.site_id }, callback);
                                layer.close(index);
                            });
                        }
                    },
                    id: 'dropdown-table-tool',
                    align: 'right', // 右对齐弹出
                    style: 'box-shadow: 1px 1px 10px rgb(0 0 0 / 12%);' // 设置额外样式
                });
            }
        });
        
        // 站点表单提交
        form.on('submit', function(data) {
            var formData = data.field;
            var isAdd = formData.site_id == '0';
            var loadIndex = layer.load(2);
            let callback = function (e) {
                layer.close(loadIndex);
                layer.msg(e.msg);
                if (e.code == 0) {
                    layer.closeAll('page');
                    if(isAdd) {
                        location.reload();
                    } else {
                        siteTableIns.reload({
                            where: {},
                            page: {
                                curr: currentPage
                            }
                        });
                    }                    
                }
            }
            if(!isAdd) {
                tool.post("{:addons_url('sitegroup://site/edit')}",formData, callback);
            } else {
                tool.post("{:addons_url('sitegroup://site/add')}",formData, callback);
            }
            return false;
        });

    }
    </script>    
{/block}
