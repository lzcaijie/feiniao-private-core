<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=0">
	<title>{$site.site_name|default='--'}</title>
    <link rel="stylesheet" href="{__ASSETS__}/init/css/feiniao.css?v={:get_config('upgrade.version')}" media="all">
</head>
{php}
$links = model('links')->where('status', 1)->order('id asc')->select();
{/php}
<body class="main-body">
    <style>
        :root {
            --primary-color: #f1f4ff;
            --secondary-color: #6f42c1;
            --success-color: #1cc88a;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
            --light-color: #f8f9fc;
            --dark-color: #5a5c69;
        }
        
        body {
            background-color: #f8f9fc;
            color: #444;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }             
        
        .main-container {
            display: flex;
            min-height: calc(100vh - 120px);
        }
        
        .content {
            flex: 1;
            padding: 25px;
            background-color: #f8f9fc;
            overflow-y: auto;
        }
        
        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
        }
        
        .card-body {
            padding: 20px;
        }        
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-active {
            background-color: rgba(28, 200, 138, 0.15);
            color: var(--success-color);
        }
        
        .status-inactive {
            background-color: rgba(231, 74, 59, 0.15);
            color: var(--danger-color);
        }
        
        .action-buttons .layui-btn {
            padding: 0 8px;
            height: 28px;
            line-height: 28px;
            font-size: 12px;
        }
        
        .form-container {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
        }   
    </style>
    <div class="main-container layui-form">
        <!-- 主内容区 -->
        <div class="content">     
            <!-- 友链管理 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title"><i class="layui-icon layui-icon-website"></i> 《{$site.site_name|default='--'}》友链管理</h2>
                    <button class="layui-btn" id="addLinksBtn">
                        <i class="layui-icon layui-icon-addition"></i> 添加友链
                    </button>                
                </div>
                <div class="card-body">
                    <div class="action-bar">                       
                        <div class="search-box">                            
                            <input type="text" class="layui-input" id="linksSearch" placeholder="搜索友链名称" style="width: 300px;">
                            <button class="layui-btn" id="linksSearchBtn">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                        </div> 
                        <button class="layui-btn layui-btn-primary" id="refreshlinksBtn">
                            <i class="layui-icon layui-icon-refresh"></i> 刷新
                        </button>
                    </div>                    
                    <table id="linksTable" lay-filter="linksTable"></table>
                </div>
            </div>
        </div>
    </div>
       
    <!-- 添加友链弹窗 -->
    <div id="linksForm" style="display: none; padding: 20px;">
        <form class="layui-form form-container" id="linksFormData">
            <input type="hidden" name="id" value="0">
            <input type="hidden" name="site_id" value="{$site_id}">
            
            <div class="form-group">
                <label>友链名称</label>
                <input type="text" class="layui-input" name="name" lay-verify="required" lay-reqText="请输入名称" placeholder="请输入名称">
            </div>
            
            <div class="form-group">
                <label>网址链接</label>
                <input type="text" name="src" placeholder="请输入友链网址链接" autocomplete="off" class="layui-input" value="">
            </div>

            <div class="form-group">
                <label>排序</label>
                <input type="text" name="sort" autocomplete="off" class="layui-input" value="0">
            </div>          

            <div class="form-group">
                <label>新窗口打开</label>
                <select class="layui-select" name="target">
                    <option value="1">是</option>
                    <option value="0">否</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>友链状态</label>
                <select class="layui-select" name="status">
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>           
            <div class="layui-form-item">
                <button class="layui-btn layui-btn-fluid" lay-submit>保存友链信息</button>
            </div>
        </form>
    </div>

    <!-- 友链操作按钮模板 -->
    <script type="text/html" id="linksActionBar">
        <button class="layui-btn layui-btn-xs" lay-event="edit">
            <i class="layui-icon layui-icon-edit"></i> 编辑
        </button>
        <button class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete">
            <i class="layui-icon layui-icon-delete"></i> 删除
        </button>
    </script>
    <script type="text/html" id="target">
        <i class="layui-icon {{#  if(d.target == 1){ }}layui-icon-ok{{#  } else { }}layui-icon-close{{#  } }}"></i>
    </script>

    <script>
	const moduleInit = ['tool'];
    const tableState = {
        keyword: '',
        currentPage: 1
    };
	function feiniaoInit() {
		var table = layui.table, tool = layui.tool, form = layui.form;         
        
        // 友链管理表格
        var linksTableIns = table.render({
            elem: '#linksTable',
            url: '{:addons_url("sitegroup://links/list",["site_id"=>$site_id])}',
            id: 'linksTable',
            page: true,
			limit: 20,
            cols: [[
                {
					field: 'sort',
					width: 80,
					title: '排序',
					align: 'center'
				},{
					field: 'name',
					width: 220,
					title: '名称',
				},{
					field: 'src',
					title: '链接'
				},{
					field: 'target',
					title: '新窗口打开',
					toolbar: '#target',
					align: 'center',
					width: 100
				},
                {field: 'status', title: '状态', width: 100, templet: function(d){
                    return d.status == 1 
                        ? '<span class="status-badge status-active">启用</span>' 
                        : '<span class="status-badge status-inactive">禁用</span>';
                }},
                {title: '操作', width: 150, align: 'center', toolbar: '#linksActionBar'}
            ]],
            done: function(res, curr, count) {
                tableState.currentPage = curr;
            }
        });

        // 友链搜索
        $('#linksSearchBtn').click(function() {
            var keyword = $('#linksSearch').val().toLowerCase();
            tableState.keyword = keyword;
            linksTableIns.reload({
				where: {
					keyword: keyword
				},
				page: {
					curr: 1
				}
			});
			return false;
        });

        // 添加友链按钮
        $('#addLinksBtn').click(function() {
            $('#linksFormData')[0].reset();
            $('#linksFormData input[name="id"]').val('0');
            layer.open({
                type: 1,
                title: '添加新友链',
                area: ['600px', '800px'],
                content: $('#linksForm'),
                success: function() {
                    form.render();
                }
            });
        });

        $('#refreshlinksBtn').click(function() {
            linksTableIns.reload({
				where: {},
				page: {
					curr: 1
				}
			});
			return false;
        });

        // 友链表格操作按钮
        table.on('tool(linksTable)', function(obj){
            var data = obj.data;
            var event = obj.event;            
            if(event === 'edit'){
                $('#linksFormData input[name="id"]').val(data.id);
                $('#linksFormData input[name="name"]').val(data.name);
                $('#linksFormData input[name="src"]').val(data.src);
                $('#linksFormData input[name="sort"]').val(data.sort);        
                $('#linksFormData select[name="target"]').val(data.target.toString());        
                $('#linksFormData select[name="status"]').val(data.status.toString());        
                layer.open({
                    type: 1,
                    title: '编辑友链信息',
                    area: ['600px', '800px'],
                    content: $('#linksForm'),
                    success: function() {
                        form.render();
                    }
                });
            } else if(event === 'delete') {
                layer.confirm('确定要删除友链：' + data.name + ' 吗？', {
					icon: 3,
					title: '删除确认',
                    btn: ['确定', '取消']
				}, function(index) {
                    var loadIndex = layer.load(2);
					let callback = function (e) {    
                        layer.close(loadIndex);                    
						layer.msg(e.msg);
						if (e.code == 0) {                            
                            layer.msg('友链已删除', {icon: 1});
                            layer.close(index);
                            linksTableIns.reload();
						}
					}
					tool.delete("{:addons_url('sitegroup://links/delete')}", { id: data.id }, callback);
					layer.close(index);
				});
            }
        });
        
         // 友链表单提交
        form.on('submit', function(data) {
            var formData = data.field;
            var isAdd = formData.id == '0';
            var loadIndex = layer.load(2);
            let callback = function (e) {
                layer.close(loadIndex);
                layer.msg(e.msg);
                if (e.code == 0) {
                    layer.closeAll('page');
                    if(!isAdd) {
                        linksTableIns.reload({
                            where: {
                                keyword: tableState.keyword,
                                links_id: tableState.links_id
                            },
                            page: {
                                curr: tableState.currentPage
                            }
                        });
                    } else {
                        linksTableIns.reload({
                            where: {},
                            page: {
                                curr: tableState.currentPage
                            }
                        });
                    }
                }
            }
            if(!isAdd) {
                tool.post("{:addons_url('sitegroup://links/edit')}",formData, callback);
            } else {
                tool.post("{:addons_url('sitegroup://links/add')}",formData, callback);
            }     
            return false;
        });
    }
    </script>    
    <script src="{__ASSETS__}/layui/layui.js"></script>
	<script src="{__ASSETS__}/init/feiniaoInit.js"></script>
</body>
</html>
