<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=0">
	<title>{$site.site_name|default='--'}</title>
    <link rel="stylesheet" href="{__ASSETS__}/init/css/feiniao.css?v={:get_config('upgrade.version')}" media="all">
</head>
<body class="main-body">
    <style>
        :root {
            --primary-color: #f1f4ff;
            --secondary-color: #6f42c1;
            --success-color: #1cc88a;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
            --light-color: #f8f9fc;
            --dark-color: #5a5c69;
        }
        
        body {
            background-color: #f8f9fc;
            color: #444;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }             
        
        .main-container {
            display: flex;
            min-height: calc(100vh - 120px);
        }
        
        .content {
            flex: 1;
            padding: 25px;
            background-color: #f8f9fc;
            overflow-y: auto;
        }
        
        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
        }
        
        .card-body {
            padding: 20px;
        }        
        
        .action-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-active {
            background-color: rgba(28, 200, 138, 0.15);
            color: var(--success-color);
        }
        
        .status-inactive {
            background-color: rgba(231, 74, 59, 0.15);
            color: var(--danger-color);
        }
        
        .action-buttons .layui-btn {
            padding: 0 8px;
            height: 28px;
            line-height: 28px;
            font-size: 12px;
        }
        
        .form-container {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
        }   
    </style>
    <div class="main-container">
        <!-- 主内容区 -->
        <div class="content">     
            <!-- 路由管理 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title"><i class="layui-icon layui-icon-website"></i> 《{$site.site_name|default='--'}》路由管理</h2>       
                    <button class="layui-btn layui-btn-normal" id="synchRouteBtn">
                        <i class="layui-icon layui-icon-templeate-1"></i> 同步路由规则
                    </button>             
                </div>
                <div class="card-body">
                    <div class="action-bar">
                        <div class="search-box">
                            <input type="text" class="layui-input" id="routeSearch" placeholder="搜索路由名称" style="width: 300px;">
                            <button class="layui-btn" id="routeSearchBtn">
                                <i class="layui-icon layui-icon-search"></i> 搜索
                            </button>
                        </div>
                        <div>
                            <button class="layui-btn layui-btn-primary" id="refreshRouteBtn">
                                <i class="layui-icon layui-icon-refresh"></i> 刷新
                            </button>
                        </div>
                    </div>                    
                    <table id="routeTable" lay-filter="routeTable"></table>
                </div>
            </div>
        </div>
    </div>
       
    <!-- 添加路由弹窗 -->
    <div id="routeForm" style="display: none; padding: 20px;">
        <form class="layui-form form-container" id="routeFormData">
            <input type="hidden" name="id" value="0">
            <input type="hidden" name="site_id" value="0">
            <div class="form-group">
                <label>路由分组</label>
                <input type="text" name="group" class="layui-input" placeholder="请输入路由分组，可为空">
            </div>
            
            <div class="form-group">
                <label>路由规则</label>
                <input type="text" class="layui-input" name="rule" lay-verify="required" lay-reqText="请输入路由规则" placeholder="请输入路由规则">
            </div>
            
            <div class="form-group">
                <label>路由状态</label>
                <select class="layui-select" name="status">
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>           
            <div class="layui-form-item">
                <button class="layui-btn layui-btn-fluid" lay-submit>保存路由信息</button>
            </div>
        </form>
    </div>

    <!-- 路由操作按钮模板 -->
    <script type="text/html" id="routeActionBar">
        <button class="layui-btn layui-btn-xs" lay-event="edit">
            <i class="layui-icon layui-icon-edit"></i> 编辑
        </button>
    </script>
    <script>
	const moduleInit = ['tool'];
    var currentPage = 1;
	function feiniaoInit() {
		var table = layui.table, tool = layui.tool, form = layui.form;         
        
        // 路由管理表格
        var routeTableIns = table.render({
            elem: '#routeTable',
            url: '{:addons_url("sitegroup://route/get",["site_id"=>$site_id])}',
            id: 'routeTable',
            page: true,
			limit: 20,
            cols: [[
                {field: 'id', title: 'ID', width: 80, sort: true},
                {field: 'rule', title: '路由规则', minWidth: 200},
                {field: 'title', title: '路由名称', minWidth: 150},
                {field: 'group', title: '路由分组', width: 150},
                {field: 'value', title: '路由值', width: 200},
                {field: 'status', title: '状态', width: 100, templet: function(d){
                    return d.status == 1 
                        ? '<span class="status-badge status-active">启用</span>' 
                        : '<span class="status-badge status-inactive">禁用</span>';
                }},
                {field: 'name', title: '路由标识', width: 180},
                {title: '操作', width: 100, align: 'center', toolbar: '#routeActionBar'}
            ]],
            done: function(res, curr, count) {
                currentPage = curr;
            }
        });

        // 路由搜索
        $('#routeSearchBtn').click(function() {
            var keyword = $('#routeSearch').val().toLowerCase();
            if (!keyword) return layer.msg('请输入关键词！');
            routeTableIns.reload({
				where: {
					keyword: keyword
				},
				page: {
					curr: 1
				}
			});
			return false;
        });

        $('#synchRouteBtn').click(function() {
            layer.confirm('一般只有升级后添加了新的路由才需要同步路由<br/>同步路由不影响已有的路由设置，确定要同步？', {
                icon: 3,
                title: '同步确认',
                btn: ['确定', '取消']
            }, function(index) {
                var loadIndex = layer.load(2);
                let callback = function (e) {    
                    layer.close(loadIndex);                    
                    layer.msg(e.msg);
                    if (e.code == 0) {
                        layer.close(index);
                        routeTableIns.reload();
                    }
                }
                tool.post("{:addons_url('sitegroup://route/synch')}", { site_id: {$site_id} }, callback);
                layer.close(index);
            });
        });

        $('#refreshRouteBtn').click(function() {
            routeTableIns.reload({
				where: {},
				page: {
					curr: 1
				}
			});
			return false;
        });

        // 路由表格操作按钮
        table.on('tool(routeTable)', function(obj){
            var data = obj.data;
            var event = obj.event;            
            if(event === 'edit'){
                $('#routeFormData input[name="id"]').val(data.id);
                $('#routeFormData input[name="site_id"]').val(data.site_id);
                $('#routeFormData input[name="group"]').val(data.group);
                $('#routeFormData input[name="rule"]').val(data.rule);
                $('#routeFormData select[name="status"]').val(data.status.toString());
                form.render();                
                layer.open({
                    type: 1,
                    title: '编辑路由信息',
                    area: ['500px', '450px'],
                    content: $('#routeForm')
                });
            }
        });
        
         // 路由表单提交
        form.on('submit', function(data) {
            var formData = data.field;
            var loadIndex = layer.load(2);
            let callback = function (e) {
                layer.close(loadIndex);
                layer.msg(e.msg);
                if (e.code == 0) {
                    layer.closeAll('page');         
                    routeTableIns.reload({
                        where: {},
                        page: {
                            curr: currentPage
                        }
                    });
                }
            }
            tool.post("{:addons_url('sitegroup://route/edit')}",formData, callback);           
            return false;
        });

    }
    </script>    
    <script src="{__ASSETS__}/layui/layui.js"></script>
	<script src="{__ASSETS__}/init/feiniaoInit.js"></script>
</body>
</html>
